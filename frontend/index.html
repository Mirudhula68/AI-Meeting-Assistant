<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Meeting Assistant</title>

  <link rel="stylesheet" href="css/style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>🧠 AI Meeting Assistant</h1>
    <p>Upload meeting audio → Get structured insights instantly</p>
  </header>

  <!-- UPLOAD SECTION -->
  <section class="card upload-section">
    <h2>🎤 Upload Meeting Audio</h2>

    <input type="file" id="audioFile" accept="audio/*">
    <button onclick="uploadAudio()">Process Meeting</button>

    <p id="status"></p>
  </section>
  <!-- DOWNLOAD SECTION -->
<section class="card">
  <h2>📥 Export Report</h2>
  <button id="downloadPdfBtn">Download PDF Report</button>
</section>

  <!-- OUTPUT GRID -->
  <section class="grid">

    <div class="card">
      <h3>📄 Transcript</h3>
      <div id="transcript"></div>
    </div>

    <div class="card">
      <h3>🧠 Summary</h3>
      <div id="summary"></div>
    </div>

    <div class="card">
      <h3>🔑 Key Points</h3>
      <ul id="keyPoints"></ul>
    </div>

    <div class="card">
      <h3>⚠️ Issues</h3>
      <ul id="issues"></ul>
    </div>

    <div class="card">
      <h3>✅ Action Items</h3>
      <ul id="actions"></ul>
    </div>

    <div class="card">
      <h3>📌 Decisions</h3>
      <ul id="decisions"></ul>
    </div>

  </section>

  <script src="js/app.js"></script>
</body>
</html>
